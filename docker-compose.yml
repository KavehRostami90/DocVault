version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Database: Host=db;Port=5432;Database=docvault;Username=docvault;Password=docvault
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - app-storage:/app/storage
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: docvault
      POSTGRES_PASSWORD: docvault
      POSTGRES_DB: docvault
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
    driver: local
  app-storage:
    driver: local
