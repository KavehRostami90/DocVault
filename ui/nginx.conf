server {
    listen 80;
    client_max_body_size 0;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so nginx doesn't try to resolve
    # upstream hostnames at startup (which fails when api isn't ready yet).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SPA fallback — let React Router handle all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend container.
    # $upstream is a variable so DNS is resolved per-request, not at startup.
    location /api/ {
        set $upstream http://api:8080;
        proxy_pass         $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward Set-Cookie headers (refresh token cookie) without modification
        proxy_pass_header  Set-Cookie;
    }
}
