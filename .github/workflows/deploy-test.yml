name: Deploy to Test

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    branches: [master]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && github.sha
              || github.event.workflow_run.head_sha
            }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/docvault
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: build-push
    environment: test

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && github.sha
              || github.event.workflow_run.head_sha
            }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --name docvault-test-infra-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --mode Incremental \
            --parameters \
              appName=${{ vars.API_APP_NAME }} \
              databaseConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}" \
              openAiApiKey="${{ secrets.OPENAI_API_KEY }}" \
              corsAllowedOrigins="${{ vars.CORS_ALLOWED_ORIGINS }}" \
              jwtSigningKey="${{ secrets.AUTH_JWT_SIGNING_KEY }}" \
              adminEmail="${{ vars.AUTH_ADMIN_EMAIL }}" \
              adminPassword="${{ secrets.AUTH_ADMIN_PASSWORD }}" \
              containerImage="ghcr.io/${{ github.repository_owner }}/docvault:${{ needs.build-push.outputs.version }}" \
              ghcrUsername="${{ github.actor }}" \
              ghcrToken="${{ secrets.GHCR_TOKEN }}"

      - name: Deploy UI to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ui
          api_location: ''
          output_location: dist

      - name: Print app URLs
        run: |
          API_URL=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ vars.API_APP_NAME }} \
            --query defaultHostName -o tsv)
          echo "API deployed to: https://$API_URL"
          echo "UI deployed to: ${{ vars.CORS_ALLOWED_ORIGINS }}"
