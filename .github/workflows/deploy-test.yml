name: Deploy to Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to deploy'
        required: false
        default: 'master'

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.ref.outputs.value }}

    steps:
      - name: Resolve ref
        id: ref
        run: echo "value=${{ inputs.ref }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/docvault
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-ui:
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/docvault-ui
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: build-push
    environment: test
    timeout-minutes: 20

    permissions:
      id-token: write
      contents: read

    outputs:
      app_url: ${{ steps.infra.outputs.app_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-push.outputs.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        id: infra
        run: |
          OUTPUT=$(az deployment group create \
            --name docvault-test-infra-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --mode Incremental \
            --output json \
            --query properties.outputs \
            --parameters \
              appName=${{ vars.API_APP_NAME }} \
              databaseConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}" \
              openAiApiKey="${{ secrets.OPENAI_API_KEY }}" \
              corsAllowedOrigins="${{ vars.CORS_ALLOWED_ORIGINS }}" \
              jwtSigningKey="${{ secrets.AUTH_JWT_SIGNING_KEY }}" \
              adminEmail="${{ vars.AUTH_ADMIN_EMAIL }}" \
              adminPassword="${{ secrets.AUTH_ADMIN_PASSWORD }}" \
              containerImage="ghcr.io/${{ github.repository_owner }}/docvault:${{ needs.build-push.outputs.version }}" \
              ghcrUsername="${{ github.actor }}" \
              ghcrToken="${{ secrets.GHCR_TOKEN }}")
          echo "app_url=$(echo "$OUTPUT" | jq -r '.appUrl.value')" >> $GITHUB_OUTPUT

      - name: Deploy UI to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ui
          api_location: ''
          output_location: dist

      - name: Health check
        run: |
          echo "Waiting for API to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ steps.infra.outputs.app_url }}/health/ready" || true)
            [ "$STATUS" = "200" ] && { echo "Healthy after $((i * 10))s"; break; }
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::API health check failed (last status: $STATUS)"
            exit 1
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Test Deployment"
            echo "| | |"
            echo "|---|---|"
            echo "| **API** | ${{ steps.infra.outputs.app_url }} |"
            echo "| **UI** | ${{ vars.CORS_ALLOWED_ORIGINS }} |"
            echo "| **Image** | \`ghcr.io/${{ github.repository_owner }}/docvault:${{ needs.build-push.outputs.version }}\` |"
            echo "| **Ref** | \`${{ needs.build-push.outputs.ref }}\` |"
          } >> $GITHUB_STEP_SUMMARY
