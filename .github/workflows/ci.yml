name: CI — Build & Test

# Required status check — blocks PR merges until this passes.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: docvault
          POSTGRES_PASSWORD: docvault
          POSTGRES_DB: docvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__Database: "Host=localhost;Port=5432;Database=docvault;Username=docvault;Password=docvault"
      Auth__JwtSigningKey: "ci-test-signing-key-minimum-32-chars!!"
      Auth__AdminEmail: "admin@docvault.local"
      Auth__AdminPassword: "Admin1234!"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore DocVault.sln

      - name: Build
        run: dotnet build DocVault.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test tests/DocVault.UnitTests
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration tests
        run: >
          dotnet test tests/DocVault.IntegrationTests
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  build-push-ui:
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    needs: build-and-test
    # Push image only on merges to master — PRs from forks may lack GHCR write access.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/docvault-ui
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
