name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: docvault
          POSTGRES_PASSWORD: docvault
          POSTGRES_DB: docvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__Database: "Host=localhost;Port=5432;Database=docvault;Username=docvault;Password=docvault"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore DocVault.sln

      - name: Build
        run: dotnet build DocVault.sln --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/DocVault.UnitTests --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration tests
        run: dotnet test tests/DocVault.IntegrationTests --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
