name: Deploy to Azure Web App

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to deploy'
        required: false
        default: 'claude/deploy-web-app-container-ZZ9Yj'
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Web App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.sha) || github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish app
        run: |
          dotnet publish src/DocVault.Api/DocVault.Api.csproj \
            -c Release \
            -o ./publish \
            /p:UseAppHost=false

      - name: Zip publish output
        run: zip -r app.zip ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Free tier Web App)
        run: |
          az deployment group create \
            --name docvault-infra-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              appName=docvault \
              databaseConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}"

      - name: Deploy app to Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name docvault \
            --src-path app.zip \
            --type zip

      - name: Print app URL
        run: |
          URL=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name docvault \
            --query defaultHostName -o tsv)
          echo "App deployed at: https://$URL"
