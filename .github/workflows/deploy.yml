name: Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/docvault

jobs:
  # ── 1. Build & push image to ghcr.io ───────────────────────────────────────
  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    outputs:
      # Exact sha-tagged image reference consumed by the deploy job
      image: ${{ steps.image-ref.outputs.value }}

    steps:
      # Check out the commit that triggered CI, not the workflow file commit
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Expose the sha-tagged reference as a job output (first tag line)
      - name: Export image reference
        id: image-ref
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "value=$TAG" >> $GITHUB_OUTPUT

  # ── 2. Provision infra + deploy container ──────────────────────────────────
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-push

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy environment infrastructure
        run: |
          az deployment group create \
            --name docvault-env-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/env.bicep \
            --parameters appName=docvault

      - name: Wait for Container Apps environment to be ready
        run: |
          echo "Waiting for Container Apps environment to reach Succeeded state..."
          for i in $(seq 1 18); do
            STATE=$(az containerapp env show \
              --name docvault-env \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")
            echo "Attempt $i: state = $STATE"
            if [ "$STATE" = "Succeeded" ]; then
              echo "Environment is ready."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for environment." && exit 1

      - name: Deploy Container App
        run: |
          az deployment group create \
            --name docvault-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              appName=docvault \
              containerImage=${{ needs.build-push.outputs.image }} \
              databaseConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}"
