name: Deploy to Azure Web App

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

# Only one deploy at a time; never cancel an in-progress deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Web App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run: deploy the exact commit that passed CI
          # workflow_dispatch: deploy the branch/SHA the dispatch was triggered on
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Publish app
        run: |
          dotnet publish src/DocVault.Api/DocVault.Api.csproj \
            -c Release \
            -o ./publish \
            /p:UseAppHost=false

      - name: Zip publish output
        run: cd publish && zip -r ../app.zip .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --name docvault-infra-${{ github.run_id }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --mode Incremental \
            --parameters \
              appName=docvault \
              databaseConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}" \
              openAiApiKey="${{ secrets.OPENAI_API_KEY }}" \
              corsAllowedOrigins="${{ vars.CORS_ALLOWED_ORIGINS || '*' }}"

      - name: Deploy app to Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name docvault \
            --src-path app.zip \
            --type zip \
            --async false

      - name: Print app URL
        run: |
          URL=$(az webapp show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name docvault \
            --query defaultHostName -o tsv)
          echo "App deployed to: https://$URL"
