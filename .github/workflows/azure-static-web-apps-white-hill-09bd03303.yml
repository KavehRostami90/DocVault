name: Close SWA Preview

# Cleans up the staging environment when a PR is closed.
# Actual deployments are handled by deploy-test.yml and deploy-production.yml.

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  close_pull_request_job:
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_HILL_09BD03303 }}
          app_location: ui
          action: close
